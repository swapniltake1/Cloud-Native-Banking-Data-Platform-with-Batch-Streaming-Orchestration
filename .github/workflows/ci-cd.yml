name: CI/CD Pipeline for Banking Data Platform

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 pytest
    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Format with Black
      run: black --check --diff src/
    - name: Run tests
      run: pytest tests/ || echo "No tests found"

  deploy-to-databricks:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Set up Databricks CLI
      run: |
        pip install databricks-cli
    - name: Configure Databricks
      run: |
        databricks configure --token <<EOF
        ${{ secrets.DATABRICKS_TOKEN }}
        ${{ secrets.DATABRICKS_HOST }}
        EOF
    - name: Deploy notebooks and jobs
      run: |
        databricks workspace import-dir notebooks /Shared/Banking-Platform --overwrite
        databricks jobs create --json-file databricks-job.json || databricks jobs update --json-file databricks-job.json